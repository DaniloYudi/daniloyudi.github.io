<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Números para Bingo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        h1 {
            color: #333;
        }
        #numero {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #007bff;
        }
        button {
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #007bff;
            color: #fff;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Gerador de Números para Bingo</h1>

    <div id="numero">Número</div>
    <button onclick="gerarNumero()">Gerar Número</button>

    <script>
        const numerosSorteados = [];
        const MAX_NUMERO = 75;

        function gerarNumero() {
            if (numerosSorteados.length === MAX_NUMERO) {
                alert('Todos os números já foram sorteados!');
                return;
            }

            let numeroSorteado;
            do {
                numeroSorteado = Math.floor(Math.random() * MAX_NUMERO) + 1;
            } while (numerosSorteados.includes(numeroSorteado));

            numerosSorteados.push(numeroSorteado);
            document.getElementById('numero').textContent = numeroSorteado;
        }
    </script>
</body>
</html>
