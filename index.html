<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteio de Nomes</title>
</head>
<body>
    <h1>Sorteio de Nomes</h1>

    <label for="nomes">Insira os nomes (separados por vírgula):</label><br>
    <textarea id="nomes" rows="4" cols="50"></textarea><br>
    <button onclick="sortearNome()">Sortear</button><br><br>

    <h2>Nome Sorteado:</h2>
    <p id="nomeSorteado"></p>

    <script>
        function sortearNome() {
            const nomes = document.getElementById('nomes').value.split(',');
            const indiceSorteado = Math.floor(Math.random() * nomes.length);
            const nomeSorteado = nomes[indiceSorteado].trim();
            document.getElementById('nomeSorteado').textContent = nomeSorteado;
        }
    </script>
</body>
</html>
