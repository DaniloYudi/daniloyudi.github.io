<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roleta</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
        }
        h1 {
            color: #333;
        }
        #roleta {
            width: 300px;
            margin: 0 auto;
            border: 2px solid #333;
            border-radius: 50%;
            padding: 10px;
            position: relative;
        }
        .opcao {
            width: 100px;
            height: 100px;
            background-color: #007bff;
            color: #fff;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotateZ(0deg);
            transition: transform 3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            cursor: pointer;
        }
        #resultado {
            margin-top: 20px;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <h1>Roleta</h1>
    <div id="roleta">
        <div class="opcao" onclick="rodar()">Tereco</div>
        <div class="opcao" onclick="rodar()">Vitao</div>
        <div class="opcao" onclick="rodar()">Joao</div>
        <div class="opcao" onclick="rodar()">Broxa</div>
        <div class="opcao" onclick="rodar()">Sem intervalo</div>
        <div class="opcao" onclick="rodar()">Caiu aqui é gay</div>
    </div>
    <div id="resultado"></div>

    <script>
        function rodar() {
            const roleta = document.getElementById('roleta');
            const opcoes = roleta.getElementsByClassName('opcao');
            const grausPorOpcao = 360 / opcoes.length;
            const resultado = document.getElementById('resultado');

            const graus = Math.floor(Math.random() * 3600) + 360;
            roleta.style.transform = `rotateZ(${graus}deg)`;

            setTimeout(() => {
                const indice = Math.floor((360 - (graus % 360)) / grausPorOpcao);
                resultado.textContent = opcoes[indice].textContent;
            }, 3000);
        }
    </script>
</body>
</html>
